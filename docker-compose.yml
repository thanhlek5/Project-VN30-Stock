version: "3.8"

services:
  # ================= STORAGE LAYER (HADOOP) =================
  namenode:
    image: bde2020/hadoop-namenode:${HADOOP_VERSION}
    container_name: namenode
    restart: always
    environment:
      - CLUSTER_NAME=vn30-cluster
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - HDFS_CONF_dfs_namenode_rpc_address=namenode:9000
    ports:
      - "9870:9870"
      - "9000:9000"
    volumes:
      - namenode_data:/hadoop/dfs/name
    networks:
      - vn30_net

  datanode:
    image: bde2020/hadoop-datanode:${HADOOP_VERSION}
    container_name: datanode
    hostname: datanode
    restart: always
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - SERVICE_PRECONDITION=namenode:9870
    depends_on:
      - namenode
    volumes:
      - datanode_data:/hadoop/dfs/data
    networks:
      vn30_net:
        ipv4_address: 172.18.0.9

  # ================= PROCESSING LAYER (APACHE SPARK) =================
  spark-master:
    image: apache/spark:${SPARK_VERSION}
    container_name: spark-master
    restart: always
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./data:/opt/spark/work-dir/data
      - ./src/etl:/opt/spark/work-dir/src/etl
    networks:
      - vn30_net

  spark-worker:
    image: apache/spark:${SPARK_VERSION}
    container_name: spark-worker
    restart: always
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_MEMORY=4G
      - SPARK_WORKER_CORES=4
    depends_on:
      - spark-master
    volumes:
      - ./data:/opt/spark/work-dir/data
      - ./src/etl:/opt/spark/work-dir/src/etl
    networks:
      - vn30_net

  spark-worker-2:
    image: apache/spark:${SPARK_VERSION}
    container_name: spark-worker-2
    restart: always
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_MEMORY=4G
      - SPARK_WORKER_CORES=4
    depends_on:
      - spark-master
    volumes:
      - ./data:/opt/spark/work-dir/data
      - ./src/etl:/opt/spark/work-dir/src/etl
    networks:
      - vn30_net

  # ================= SERVING LAYER (POSTGRES) =================
  postgres:
    image: postgres:${POSTGRES_VERSION}
    container_name: postgres
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - vn30_net

  # ================= UI LAYER (STREAMLIT) =================
  streamlit:
    build:
      context: ./docker/streamlit
    container_name: streamlit
    restart: always
    ports:
      - "8501:8501"
    environment:
      - DB_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    volumes:
      - ./src/web:/app
      - ./data:/app/data
    depends_on:
      - postgres
    networks:
      - vn30_net

  # ================= ORCHESTRATION (AIRFLOW) =================
  airflow-init:
    build:
      context: .
      dockerfile: docker/airflow/dockerfile
    container_name: airflow-init
    user: "${AIRFLOW_UID:-50000}:0"
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    depends_on:
      - postgres
    command: bash -c "airflow db init && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com"
    networks:
      - vn30_net

  airflow-webserver:
    build:
      context: .
      dockerfile: docker/airflow/dockerfile
    container_name: airflow-webserver
    restart: always
    user: "${AIRFLOW_UID:-50000}:0"
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64
      - HADOOP_USER_NAME=root
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
      - ./config/airflow.cfg:/opt/airflow/airflow.cfg
    ports:
      - "8081:8080"
    depends_on:
      - postgres
      - airflow-init
    command: webserver
    networks:
      - vn30_net

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/airflow/dockerfile
    container_name: airflow-scheduler
    restart: always
    user: "${AIRFLOW_UID:-50000}:0"
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64
      - HADOOP_USER_NAME=root
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
      - ./config/airflow.cfg:/opt/airflow/airflow.cfg
    depends_on:
      - airflow-webserver
    command: scheduler
    networks:
      - vn30_net

networks:
  vn30_net:
    name: ${PROJECT_NAME}_network
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/16

volumes:
  namenode_data:
  datanode_data:
  postgres_data: