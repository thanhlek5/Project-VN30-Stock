
services:
  # --- HADOOP CLUSTER ---
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    restart: always
    ports:
      - "9870:9870"
      - "9000:9000"
    env_file:
      - ./hadoop.env
    volumes:
      - hadoop_namenode:/hadoop/dfs/name

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    restart: always
    depends_on:
      - namenode
    env_file:
      - ./hadoop.env
    volumes:
      - hadoop_datanode:/hadoop/dfs/data

  # --- SPARK CLUSTER ---
  spark-master:
    image: bde2020/spark-master:3.0.1-hadoop3.2
    container_name: spark-master
    ports:
      - "8080:8080"
      - "7077:7077"
    environment:
      - PYSPARK_PYTHON=python3

  spark-worker:
    image: bde2020/spark-worker:3.0.1-hadoop3.2
    container_name: spark-worker
    depends_on:
      - spark-master
    environment:
      - "SPARK_MASTER=spark://spark-master:7077"
    ports:
      - "8081:8081"

  # --- Streamlit SERVICE ---
streamlit-app:
    build: ./streamlit_app
    container_name: streamlit-service
    ports:
      - "8501:8501" # Cổng mặc định của Streamlit
    depends_on:
      - spark-master
      - namenode
    volumes:
      # Ánh xạ thư mục datasets từ ngoài vào trong container để dễ kiểm tra file
      - ./datasets:/app/datasets