[core]
# Executor: LocalExecutor phù hợp với 1 máy, không cần Celery/K8s
executor = LocalExecutor

# Thư mục chứa DAGs (mount từ ./dags)
dags_folder = /opt/airflow/dags

# Không load DAG mẫu của Airflow
load_examples = False

# Timezone Việt Nam
default_timezone = Asia/Ho_Chi_Minh

# Số DAG chạy song song tối đa
parallelism = 8

# Số task của 1 DAG chạy song song
max_active_tasks_per_dag = 4

# Số DAG run cùng lúc
max_active_runs_per_dag = 1

[database]
# Kết nối PostgreSQL (dùng biến môi trường trong docker-compose)
sql_alchemy_conn = postgresql+psycopg2://admin:admin123@postgres:5432/vn30_db

# Pool kết nối DB
sql_alchemy_pool_size = 5
sql_alchemy_max_overflow = 10

[webserver]
web_server_port = 8080
web_server_host = 0.0.0.0

# Số worker cho webserver
workers = 2

# Timeout (giây)
web_server_worker_timeout = 120

# Fix lỗi 403 khi xem log - phải giống nhau giữa webserver và scheduler
secret_key = vn30_bigdata_secret_key_2024

[scheduler]
# Chu kỳ scheduler quét DAG mới (giây)
dag_dir_list_interval = 30

# Số lần retry khi scheduler lỗi
num_runs = -1

# Bật tính năng tự parse DAG khi file thay đổi
min_file_process_interval = 30

[logging]
# Thư mục log
base_log_folder = /opt/airflow/logs

# Log level
logging_level = INFO

# Giữ log bao nhiêu ngày
log_retention_days = 15

[smtp]
smtp_host = smtp.gmail.com
smtp_starttls = True
smtp_ssl = False
smtp_port = 587
